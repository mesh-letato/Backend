spring:
  application:
    name: link-service
  datasource:
    url: jdbc:h2:mem:linktest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# 테스트용 더미 설정 (실제 외부 호출은 하지 않음)
kakao:
  api:
    key: test-kakao-key
    local-search-url: https://dapi.kakao.com/v2/local/search/keyword.json
    search-size: 5

aws:
  region: ap-northeast-2
  bedrock:
    model-id: test-model

ytdlp:
  binary: yt-dlp
  timeout-seconds: 30
