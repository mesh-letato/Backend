spring:
  application:
    name: link-service

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# 카카오 로컬 키워드 검색 (core-service와 동일한 REST API 키 사용)
kakao:
  api:
    key: ${KAKAO_API_KEY}
    local-search-url: https://dapi.kakao.com/v2/local/search/keyword.json

# AWS Bedrock (LLM 장소 추출)
aws:
  region: ${AWS_REGION:ap-northeast-2}
  bedrock:
    model-id: ${BEDROCK_MODEL_ID:anthropic.claude-3-5-sonnet-20241022-v2:0}

# yt-dlp 실행 설정
ytdlp:
  binary: ${YTDLP_BINARY:yt-dlp}
  timeout-seconds: 30
