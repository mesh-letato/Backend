spring:
  application:
    name: link-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pinmoa_dev}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:pinmoa}
    password: ${DB_PASSWORD:pinmoa1234}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api/link/v3/api-docs
  swagger-ui:
    path: /api/link/swagger-ui.html

# 카카오 로컬 키워드 검색 (core-service와 동일한 REST API 키 사용)
kakao:
  api:
    key: ${KAKAO_API_KEY}
    local-search-url: https://dapi.kakao.com/v2/local/search/keyword.json

# AWS Bedrock (LLM 장소 추출)
aws:
  region: ${AWS_REGION:ap-northeast-2}
  bedrock:
    model-id: ${BEDROCK_MODEL_ID:anthropic.claude-3-5-sonnet-20241022-v2:0}

# yt-dlp 실행 설정
ytdlp:
  binary: ${YTDLP_BINARY:yt-dlp}
  timeout-seconds: 30
