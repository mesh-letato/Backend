spring:
  application:
    name: link-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pinmoa_dev}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:pinmoa}
    password: ${DB_PASSWORD:pinmoa1234}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api/link/v3/api-docs
  swagger-ui:
    path: /api/link/swagger-ui.html

# 카카오 로컬 키워드 검색 (core-service와 동일한 REST API 키 사용)
kakao:
  api:
    key: ${KAKAO_API_KEY}
    local-search-url: https://dapi.kakao.com/v2/local/search/keyword.json

# Google Gemini (LLM 장소 추출)
gemini:
  api:
    key: ${GEMINI_API_KEY}
    model: ${GEMINI_MODEL_ID}
