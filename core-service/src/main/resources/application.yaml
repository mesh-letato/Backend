spring:
  application:
    name: core-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:pinmoa;MODE=PostgreSQL}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api/core/v3/api-docs
  swagger-ui:
    path: /api/core/swagger-ui.html

kakao:
  api:
    key: ${KAKAO_API_KEY}
  oauth:
    # 카카오 로그인 > 보안 탭에서 Client Secret 을 켠 경우에만 값 설정 (꺼져 있으면 비워둔다)
    client-secret: ${KAKAO_CLIENT_SECRET:}

jwt:
  secret: ${JWT_SECRET:pinmoa-local-dev-secret-key-must-be-at-least-256-bits-long}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:1209600000}
