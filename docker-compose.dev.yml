services:
  pinmoa-postgres:
    image: postgres:16
    container_name: pinmoa-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pinmoa_dev
      POSTGRES_USER: pinmoa
      POSTGRES_PASSWORD: pinmoa1234
      TZ: Asia/Seoul
    volumes:
      - pinmoa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinmoa -d pinmoa_dev"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pinmoa_postgres_data:
