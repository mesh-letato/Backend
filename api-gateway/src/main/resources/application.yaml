spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: core-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/core/**
          - id: link-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/link/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
