spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: core-service
              uri: ${CORE_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/core/**
            - id: link-service
              uri: ${LINK_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/link/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: core-service
        url: /api/core/v3/api-docs
      - name: link-service
        url: /api/link/v3/api-docs

# JWT 검증 (core-service 와 동일한 시크릿)
jwt:
  secret: ${JWT_SECRET:pinmoa-local-dev-secret-key-must-be-at-least-256-bits-long}
