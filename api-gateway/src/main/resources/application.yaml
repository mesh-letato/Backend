spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: core-service
        url: /api/core/v3/api-docs
      - name: link-service
        url: /api/link/v3/api-docs

jwt:
  secret: ${JWT_SECRET:pinmoa-jwt-secret-key-must-be-at-least-32-characters-long}
