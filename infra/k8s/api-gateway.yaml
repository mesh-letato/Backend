apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: pinmoa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: 211395677813.dkr.ecr.ap-northeast-2.amazonaws.com/pinmoa/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: CORE_SERVICE_URL
              value: "http://core-service:8081"
            - name: LINK_SERVICE_URL
              value: "http://link-service:8082"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: pinmoa
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
